services:
  postgres:
    image: postgres:16-alpine
    container_name: dogovora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dogovora
      POSTGRES_PASSWORD: dogovora_secret
      POSTGRES_DB: dogovora_dev
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dogovora-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
